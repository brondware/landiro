<section class="cms-section-custom download-cta-01">
  <div class="dc1-glow dc1-glow-left"></div>
  <div class="dc1-glow dc1-glow-right"></div>
  <div class="dc1-inner">
    <div class="dc1-badges" data-animate>
      <span class="dc1-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        {{PHP_BADGE}}
      </span>
      <span class="dc1-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        {{LICENSE_BADGE}}
      </span>
      <span class="dc1-badge">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        {{SIZE_BADGE}}
      </span>
    </div>
    <h2 class="dc1-title" data-animate data-delay="80">{{HEADLINE}}</h2>
    <p class="dc1-sub" data-animate data-delay="160">{{SUBHEADLINE}}</p>

    <div class="dc1-counter-wrap" data-animate data-delay="240">
      <span class="dc1-counter-val" id="dc1-count">—</span>
      <span class="dc1-counter-lbl">{{COUNTER_LABEL}}</span>
    </div>

    <div class="dc1-btns" data-animate data-delay="320">
      <a href="{{DL_URL}}" class="dc1-btn-primary" id="dc1-dl-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        {{DL_TEXT}}
      </a>
      <a href="{{GH_URL}}" class="dc1-btn-ghost" target="_blank" rel="noopener noreferrer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        {{GH_TEXT}}
      </a>
    </div>
  </div>
</section>
