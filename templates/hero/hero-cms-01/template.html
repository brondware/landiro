<section class="cms-section-hero hero-cms-01">
  <div class="hcms-glow hcms-glow-left"></div>
  <div class="hcms-glow hcms-glow-right"></div>
  <div class="hcms-inner">
    <div class="hcms-text" data-animate>
      <span class="hcms-badge">{{BADGE_TEXT}}</span>
      <h1 class="hcms-title">{{HEADLINE}}</h1>
      <p class="hcms-sub">{{SUBHEADLINE}}</p>
      <div class="hcms-btns">
        <a href="{{CTA_URL}}" class="hcms-btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          {{CTA_TEXT}}
        </a>
        <a href="{{GITHUB_URL}}" class="hcms-btn-ghost" target="_blank" rel="noopener noreferrer">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          {{GITHUB_TEXT}}
        </a>
      </div>
    </div>
    <div class="hcms-visual" data-animate data-delay="200">
      <div class="hcms-screen" style="background-image:url('{{IMAGE_URL}}')">
        <div class="hcms-screen-placeholder">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
          <span>Скриншот адмін-панелі</span>
        </div>
      </div>
      <div class="hcms-screen-badge hcms-screen-badge-1">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        CRM + замовлення
      </div>
      <div class="hcms-screen-badge hcms-screen-badge-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        A/B тестування
      </div>
    </div>
  </div>
</section>
