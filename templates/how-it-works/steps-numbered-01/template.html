<section class="cms-section-how-it-works steps-numbered-01">
  <div class="sn1-inner">
    <h2 class="sn1-title" data-animate>{{HEADLINE}}</h2>
    <div class="sn1-steps">
      <div class="sn1-step" data-animate data-delay="0">
        <div class="sn1-num">1</div>
        <div class="sn1-step-body">
          <h3 class="sn1-step-title">{{S1_TITLE}}</h3>
          <p class="sn1-step-text">{{S1_TEXT}}</p>
        </div>
      </div>
      <div class="sn1-connector" aria-hidden="true"></div>
      <div class="sn1-step" data-animate data-delay="150">
        <div class="sn1-num">2</div>
        <div class="sn1-step-body">
          <h3 class="sn1-step-title">{{S2_TITLE}}</h3>
          <p class="sn1-step-text">{{S2_TEXT}}</p>
        </div>
      </div>
      <div class="sn1-connector" aria-hidden="true"></div>
      <div class="sn1-step" data-animate data-delay="300">
        <div class="sn1-num">3</div>
        <div class="sn1-step-body">
          <h3 class="sn1-step-title">{{S3_TITLE}}</h3>
          <p class="sn1-step-text">{{S3_TEXT}}</p>
        </div>
      </div>
    </div>
  </div>
</section>
